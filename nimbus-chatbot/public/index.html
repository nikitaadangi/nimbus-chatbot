<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimbus — AI chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
<style>
  :root{
    --bg:#F6F5F2;
    --surface:#FFFFFF;
    --border:#E4E2DA;
    --text:#1C1C1A;
    --text-secondary:#6B6A63;
    --accent:#4338CA;
    --teal:#0D9488;
    --danger-bg:#FBEAEA;
    --danger-text:#9B3B3B;
    --radius:14px;
    --radius-sm:8px;
    --font-ui:'Inter', system-ui, sans-serif;
    --font-display:'Space Grotesk', var(--font-ui);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg); color:var(--text); font-family:var(--font-ui);}
  .app{display:flex; flex-direction:column; height:100vh;}

  .topbar{display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); flex-shrink:0;}
  .brand{display:flex; align-items:center; gap:8px; font-family:var(--font-display); font-weight:600; font-size:17px;}
  .brand-mark{color:var(--accent); font-size:20px;}
  .ghost-btn{background:transparent; border:1px solid var(--border); border-radius:var(--radius-sm); padding:7px 14px; font-size:13px; color:var(--text); cursor:pointer; font-family:var(--font-ui); transition:transform .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease;}
  .ghost-btn:hover{border-color:var(--accent); color:var(--accent); transform:translateY(-1px); box-shadow:0 10px 18px rgba(67,56,202,.08);}
  .select-wrapper{display:flex; align-items:center; gap:8px; margin-left:12px; color:var(--text-secondary); font-size:13px;}
  .select-wrapper select{border:1px solid var(--border); border-radius:999px; padding:7px 10px; background:var(--surface); color:var(--text);}

  .layout{display:flex; flex:1; min-height:0;}
  .sidebar{width:280px; flex-shrink:0; border-right:1px solid var(--border); background:var(--surface); padding:18px 16px 20px; overflow-y:auto;}
  .sidebar-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; gap:10px;}
  .sidebar-title{font-weight:600; color:var(--text); font-size:14px;}
  .session-list{display:flex; flex-direction:column; gap:10px;}
  .session-item{border:1px solid var(--border); border-radius:16px; padding:12px 14px; background:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:space-between; transition:border-color .18s ease, background .18s ease, transform .18s ease, box-shadow .18s ease; opacity:0; transform:translateX(-8px); animation:sessionItemEnter .25s ease forwards;}
  .session-item:hover{border-color:var(--accent); transform:translateX(0); box-shadow:0 16px 28px rgba(67,56,202,.08);}
  .session-item.active{border-color:var(--accent); background:rgba(67,56,202,.08);}
  .session-item-main{display:flex; flex-direction:column; gap:4px; align-items:flex-start; width:100%; border:none; background:transparent; cursor:pointer; text-align:left;}
  .session-item-title{font-size:14px; color:var(--text); font-weight:600; margin:0;}
  .session-item-meta{font-size:12px; color:var(--text-secondary); margin:0;}
  .session-delete-btn{position:absolute; top:10px; right:10px; border:none; background:transparent; color:var(--text-secondary); font-size:15px; cursor:pointer; padding:3px 6px; border-radius:999px; transition:background .18s ease, color .18s ease;}
  .session-delete-btn:hover{background:rgba(67,56,202,.08); color:var(--accent);}
  .sidebar-empty{color:var(--text-secondary); font-size:13px;}

  .chat-area{flex:1; overflow-y:auto; padding:24px 20px 8px;}
  .chat-area-inner{max-width:720px; width:100%; margin:0 auto; min-height:100%; display:flex; flex-direction:column; animation:contentFadeIn .35s ease both;}

  .empty-state{display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center; gap:22px; padding:20px 0;}
  .empty-state h1{font-family:var(--font-display); font-size:26px; font-weight:600; margin:0;}
  .chips{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:540px;}
  .chip{background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:9px 16px; font-size:13.5px; color:var(--text); cursor:pointer; font-family:var(--font-ui); transition:border-color .18s ease, color .18s ease, transform .18s ease, box-shadow .18s ease;}
  .chip:hover{border-color:var(--accent); color:var(--accent); transform:translateY(-2px); box-shadow:0 12px 24px rgba(67,56,202,.08);}

  .messages{display:flex; flex-direction:column; gap:20px; padding-bottom:16px;}
  .msg{display:flex; gap:12px;}
  .msg.user{justify-content:flex-end;}
  .avatar{width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; font-family:var(--font-display); background:var(--accent); color:#fff;}
  .bubble{padding:11px 15px; border-radius:var(--radius); font-size:15px; line-height:1.65; max-width:80%; opacity:0; transform:translateY(5px); animation:bubbleEnter .22s ease forwards;}
  .msg.user .bubble{background:var(--accent); color:#fff; border-radius:var(--radius) var(--radius) 4px var(--radius); white-space:pre-wrap;}
  .msg.assistant .bubble{background:transparent; color:var(--text); padding:2px 0 0; max-width:100%;}
  .msg.error .bubble{background:var(--danger-bg); color:var(--danger-text); max-width:100%;}
  .bubble p{margin:0 0 10px;}
  .bubble p:last-child{margin-bottom:0;}
  .bubble code{background:var(--border); padding:2px 5px; border-radius:4px; font-size:13.5px; font-family:Consolas, monospace;}
  .bubble pre{background:#1C1C1A; color:#F6F5F2; padding:12px 14px; border-radius:10px; overflow-x:auto; font-size:13px;}
  .bubble pre code{background:transparent; padding:0; color:inherit;}
  .bubble ul, .bubble ol{margin:0 0 10px; padding-left:22px;}

  .thinking{display:flex; gap:5px; padding:9px 0;}
  .thinking span{width:6px; height:6px; border-radius:50%; background:var(--teal); animation:bounce 1.2s infinite ease-in-out;}
  .thinking span:nth-child(2){animation-delay:.15s;}
  .thinking span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,80%,100%{transform:scale(.6); opacity:.4;} 40%{transform:scale(1); opacity:1;}}
  @keyframes cardEntrance{0%{opacity:0; transform:translateY(24px);}100%{opacity:1; transform:translateY(0);}}
  @keyframes contentFadeIn{0%{opacity:0; transform:translateY(12px);}100%{opacity:1; transform:translateY(0);}}
  @keyframes bubbleEnter{0%{opacity:0; transform:translateY(10px);}100%{opacity:1; transform:translateY(0);}}
  @keyframes sessionItemEnter{0%{opacity:0; transform:translateX(-10px);}100%{opacity:1; transform:translateX(0);} }
  @media (prefers-reduced-motion: reduce){ .thinking span{animation:none; opacity:1;} .login-card, .chat-area-inner, .bubble, .session-item{animation:none;} }

  .composer{border-top:1px solid var(--border); padding:14px 20px 10px; flex-shrink:0;}
  #composerForm{max-width:720px; margin:0 auto; display:flex; align-items:flex-end; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:8px 8px 8px 16px; transition:border-color .15s, box-shadow .15s;}
  #composerForm:focus-within{border-color:var(--accent); box-shadow:0 0 0 2px rgba(67,56,202,0.15);}

  .hidden{display:none !important;}
  .login-screen{display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; background:linear-gradient(180deg, #EDF2FF 0%, #F8FAFC 100%);}
  .login-card{width:100%; max-width:420px; background:#fff; border:1px solid var(--border); border-radius:24px; box-shadow:0 24px 80px rgba(20,24,64,0.12); padding:32px; opacity:0; transform:translateY(18px); animation:cardEntrance .42s ease forwards;}
  .login-title{font-family:var(--font-display); margin:0 0 12px; font-size:28px; color:var(--text);}
  .login-note{margin:0 0 24px; color:var(--text-secondary); line-height:1.6;}
  .login-field{display:flex; flex-direction:column; gap:8px; margin-bottom:18px; font-size:14px; color:var(--text-secondary);}
  .login-field input{width:100%; border:1px solid var(--border); border-radius:14px; padding:12px 14px; font-size:15px; font-family:var(--font-ui);}
  .login-field input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(67,56,202,0.12);}
  .login-logo{display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:20px;}
  .login-logo-icon{width:48px; height:48px; border-radius:16px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, rgba(67,56,202,.95), rgba(13,148,136,.95)); color:#fff; font-size:24px; box-shadow:0 18px 40px rgba(67,56,202,.12);}
  .login-logo-text{display:flex; flex-direction:column; text-align:left;}
  .login-logo-text strong{font-size:18px; color:var(--text);}
  .login-logo-text span{font-size:13px; color:var(--text-secondary);}
  #loginBtn{width:100%; border:none; border-radius:14px; padding:14px; background:var(--accent); color:#fff; font-size:15px; cursor:pointer; font-family:var(--font-ui);}
  .login-error{min-height:20px; margin:12px 0 0; color:var(--danger-text); font-size:13px;}
  .user-label{margin-left:10px; font-size:14px; color:var(--text-secondary);}
  #input{flex:1; border:none; outline:none; resize:none; font-family:var(--font-ui); font-size:15px; line-height:1.5; max-height:160px; background:transparent; color:var(--text); padding:8px 0;}
  #sendBtn{width:34px; height:34px; border-radius:50%; border:none; background:var(--accent); color:#fff; font-size:16px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  #sendBtn:disabled{opacity:.4; cursor:default;}
  #sendBtn:focus-visible, .chip:focus-visible, .ghost-btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .disclaimer{text-align:center; font-size:11.5px; color:var(--text-secondary); margin:8px 0 0;}

  @media (max-width:480px){
    .topbar{padding:12px 14px;}
    .chat-area{padding:18px 14px 8px;}
    .composer{padding:10px 14px 8px;}
    .empty-state h1{font-size:22px;}
    .bubble{max-width:88%;}
  }
</style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">N</div>
        <div class="login-logo-text">
          <strong>Nimbus Chat</strong>
          <span>Your AI companion</span>
        </div>
      </div>
      <h1 class="login-title">Welcome to Nimbus</h1>
      <p class="login-note">Sign in to access the chatbot.</p>
      <form id="loginForm">
        <label class="login-field">
          <span>Username</span>
          <input id="username" type="text" autocomplete="username" required>
        </label>
        <label class="login-field">
          <span>Password</span>
          <input id="password" type="password" autocomplete="current-password" required>
        </label>
        <button id="loginBtn" type="submit">Sign in</button>
        <p class="login-error" id="loginError" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <div class="app hidden" id="app">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">&#9670;</span><span>Nimbus</span><span id="userLabel" class="user-label"></span></div>
      <div style="display:flex; align-items:center; gap:10px;">
        <label class="select-wrapper">
          <span>Answer level</span>
          <select id="answerLevel">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </label>
        <button id="newChatBtn" class="ghost-btn" type="button">New chat</button>
        <button id="logoutBtn" class="ghost-btn" type="button">Logout</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">Previous chats</div>
        </div>
        <div id="sessionList" class="session-list">
          <div class="sidebar-empty">No previous chats yet. Start a new chat.</div>
        </div>
      </aside>

      <main class="chat-area" id="chatArea">
      <div class="chat-area-inner">
        <div id="emptyState" class="empty-state">
          <h1>What can I help with?</h1>
          <div class="chips">
            <button class="chip" type="button" data-prompt="Explain recursion with a simple example">Explain recursion with a simple example</button>
            <button class="chip" type="button" data-prompt="Help me debug this Python error: list index out of range">Help me debug a Python error</button>
            <button class="chip" type="button" data-prompt="What's the difference between TCP and UDP?">TCP vs UDP, in plain terms</button>
          </div>
        </div>
        <div id="messages" class="messages"></div>
      </div>
    </main>

    <footer class="composer">
      <form id="composerForm">
        <textarea id="input" placeholder="Message Nimbus..." rows="1"></textarea>
        <button id="sendBtn" type="submit" aria-label="Send message">&#8593;</button>
      </form>
      <p class="disclaimer">Responses are AI-generated and may be inaccurate.</p>
    </footer>
  </div>

<script>
  let messages = [];
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('emptyState');
  const chatArea = document.getElementById('chatArea');
  const form = document.getElementById('composerForm');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const newChatBtn = document.getElementById('newChatBtn');
  const answerLevelSelect = document.getElementById('answerLevel');
  let currentUser = null;
  let answerLevel = 'medium';
  let sessions = [];
  let activeSessionId = null;

  const sessionListEl = document.getElementById('sessionList');
  const chatStorageKey = (user, sessionId) => `nimbusChat:${user}:${sessionId}`;
  const sessionsKey = (user) => `nimbusSessions:${user}`;
  const levelStorageKey = (user) => `nimbusAnswerLevel:${user}`;

  function saveSessionsList() {
    if (!currentUser) return;
    localStorage.setItem(sessionsKey(currentUser), JSON.stringify(sessions));
  }

  function saveSessionData() {
    if (!currentUser || !activeSessionId) return;
    localStorage.setItem(chatStorageKey(currentUser, activeSessionId), JSON.stringify(messages));
    localStorage.setItem(levelStorageKey(currentUser), answerLevel);
  }

  function saveSession() {
    saveSessionData();
    updateSessionTimestamp();
  }

  function deleteSession(sessionId) {
    if (!currentUser || !sessionId) return;
    const sessionIndex = sessions.findIndex((item) => item.id === sessionId);
    if (sessionIndex === -1) return;

    localStorage.removeItem(chatStorageKey(currentUser, sessionId));
    sessions.splice(sessionIndex, 1);

    if (activeSessionId === sessionId) {
      activeSessionId = sessions.length ? sessions[0].id : null;
      messages = [];
      if (activeSessionId) {
        const data = localStorage.getItem(chatStorageKey(currentUser, activeSessionId));
        messages = data ? JSON.parse(data) : [];
      }
      messagesEl.innerHTML = '';
      emptyState.style.display = messages.length === 0 ? 'flex' : 'none';
      messages.forEach((message) => {
        if (message.role === 'assistant') {
          addMessageToDOM('assistant', marked.parse(message.content), true);
        } else {
          addMessageToDOM(message.role, message.content, false);
        }
      });
    }

    saveSessionsList();
    renderSessionList();
  }

  function updateSessionTimestamp() {
    if (!currentUser || !activeSessionId) return;
    const session = sessions.find((item) => item.id === activeSessionId);
    if (!session) return;
    session.updatedAt = new Date().toLocaleString();
    saveSessionsList();
    renderSessionList();
  }

  function loadSessions(user) {
    const stored = localStorage.getItem(sessionsKey(user));
    if (stored) {
      try {
        sessions = JSON.parse(stored);
      } catch {
        sessions = [];
      }
    } else {
      sessions = [];
    }
    renderSessionList();
  }

  function renderSessionList() {
    sessionListEl.innerHTML = '';

    if (sessions.length === 0) {
      sessionListEl.innerHTML = '<div class="sidebar-empty">No previous chats yet. Start a new chat.</div>';
      return;
    }

    sessions.forEach((session) => {
      const item = document.createElement('div');
      item.className = 'session-item' + (session.id === activeSessionId ? ' active' : '');

      const main = document.createElement('button');
      main.type = 'button';
      main.className = 'session-item-main';
      main.innerHTML = `<div class="session-item-title">${session.title}</div><div class="session-item-meta">${session.updatedAt}</div>`;
      main.addEventListener('click', () => {
        if (session.id === activeSessionId) return;
        switchSession(session.id);
      });

      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'session-delete-btn';
      deleteBtn.title = 'Delete chat';
      deleteBtn.textContent = '×';
      deleteBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        deleteSession(session.id);
      });

      item.appendChild(main);
      item.appendChild(deleteBtn);
      sessionListEl.appendChild(item);
    });
  }

  function getSessionTitle(text) {
    const content = text.replace(/\s+/g, ' ').trim();
    if (!content) return 'New chat';
    return content.length > 40 ? content.slice(0, 40) + '...' : content;
  }

  function updateSessionTitle(text) {
    if (!currentUser || !activeSessionId) return;
    const session = sessions.find((item) => item.id === activeSessionId);
    if (!session) return;
    session.title = getSessionTitle(text);
    saveSessionsList();
    renderSessionList();
  }

  function createNewSession() {
    if (currentUser && activeSessionId) {
      saveSessionData();
    }

    const id = `session-${Date.now()}`;
    const session = {
      id,
      title: 'New chat',
      updatedAt: new Date().toLocaleString(),
    };
    sessions.unshift(session);
    activeSessionId = id;
    messages = [];
    saveSessionsList();
    renderSessionList();
    messagesEl.innerHTML = '';
    emptyState.style.display = 'flex';
    answerLevel = localStorage.getItem(levelStorageKey(currentUser)) || 'medium';
    answerLevelSelect.value = answerLevel;
    saveSessionData();
  }

  function switchSession(sessionId) {
    saveSessionData();
    activeSessionId = sessionId;
    const sessionData = localStorage.getItem(chatStorageKey(currentUser, sessionId));
    messages = sessionData ? JSON.parse(sessionData) : [];
    const meta = sessions.find((session) => session.id === sessionId);
    answerLevel = localStorage.getItem(levelStorageKey(currentUser)) || 'medium';
    answerLevelSelect.value = answerLevel;
    messagesEl.innerHTML = '';
    emptyState.style.display = messages.length === 0 ? 'flex' : 'none';
    messages.forEach((message) => {
      if (message.role === 'assistant') {
        addMessageToDOM('assistant', marked.parse(message.content), true);
      } else {
        addMessageToDOM(message.role, message.content, false);
      }
    });
    scrollToBottom();
    renderSessionList();
  }

  function loadSession(user) {
    loadSessions(user);
    createNewSession();
  }

  function scrollToBottom(){
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function addMessageToDOM(role, content, isHtml){
    const row = document.createElement('div');
    row.className = 'msg ' + role;
    if(role === 'assistant'){
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = 'N';
      row.appendChild(avatar);
    }
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if(isHtml){
      bubble.innerHTML = content;
    } else {
      bubble.textContent = content;
    }
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return row;
  }

  function showThinking(){
    const row = document.createElement('div');
    row.className = 'msg assistant';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'N';
    row.appendChild(avatar);
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return row;
  }

  // Calls our own backend (server.js), which holds the real API key.
  async function callBackend(history){
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, level: answerLevel })
    });
    const data = await response.json();
    if(!response.ok){
      throw new Error(data.error || 'Request failed');
    }
    return data.reply;
  }

  async function handleSend(rawText){
    const text = rawText.trim();
    if(!text || sendBtn.disabled) return;

    emptyState.style.display = 'none';
    addMessageToDOM('user', text, false);
    messages.push({ role: 'user', content: text });
    updateSessionTitle(text);

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const thinkingRow = showThinking();
    try {
      const reply = await callBackend(messages);
      thinkingRow.remove();
      const html = marked.parse(reply);
      addMessageToDOM('assistant', html, true);
      messages.push({ role: 'assistant', content: reply });
      saveSession();
    } catch (err){
      thinkingRow.remove();
      addMessageToDOM('error', 'Something went wrong: ' + err.message, false);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    handleSend(input.value);
  });

  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      handleSend(input.value);
    }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  document.querySelectorAll('.chip').forEach((chip) => {
    chip.addEventListener('click', () => handleSend(chip.dataset.prompt));
  });

  answerLevelSelect.value = answerLevel;
  answerLevelSelect.addEventListener('change', () => {
    answerLevel = answerLevelSelect.value;
    saveSessionData();
  });

  newChatBtn.addEventListener('click', () => {
    if (!currentUser) return;
    createNewSession();
    input.value = '';
    input.style.height = 'auto';
    input.focus();
  });

  const loginScreen = document.getElementById('loginScreen');
  const appEl = document.getElementById('app');
  const loginForm = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const loginError = document.getElementById('loginError');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const logoutBtn = document.getElementById('logoutBtn');
  const userLabel = document.getElementById('userLabel');

  function setUser(user) {
    currentUser = user || null;
    if(user){
      loginScreen.classList.add('hidden');
      appEl.classList.remove('hidden');
      userLabel.textContent = `(${user})`;
      usernameInput.value = '';
      passwordInput.value = '';
      loginError.textContent = '';
      input.focus();
    } else {
      loginScreen.classList.remove('hidden');
      appEl.classList.add('hidden');
      userLabel.textContent = '';
    }
  }

  function validateCredentials(username, password) {
    return username.trim().length > 0 && password.trim().length >= 4;
  }

  loginForm.addEventListener('submit', (event) => {
    event.preventDefault();
    const username = usernameInput.value.trim();
    const password = passwordInput.value;

    if(!validateCredentials(username, password)){
      loginError.textContent = 'Please enter a username and a password with at least 4 characters.';
      return;
    }

    localStorage.setItem('nimbusUser', username);
    setUser(username);
    loadSession(username);
  });

  logoutBtn.addEventListener('click', () => {
    localStorage.removeItem('nimbusUser');
    currentUser = null;
    messages = [];
    activeSessionId = null;
    setUser(null);
  });

  const storedUser = localStorage.getItem('nimbusUser');
  if (storedUser) {
    setUser(storedUser);
    loadSession(storedUser);
  }
</script>
</body>
</html>
